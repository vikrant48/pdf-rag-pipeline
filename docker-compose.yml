version: '3.8'

services:
  # RAG FastAPI application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-rag-service-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      # Pass host env vars or let compose read them from local .env automatically
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - SUPABASE_S3_ENDPOINT=${SUPABASE_S3_ENDPOINT}
      - SUPABASE_S3_ACCESS_KEY=${SUPABASE_S3_ACCESS_KEY}
      - SUPABASE_S3_SECRET_KEY=${SUPABASE_S3_SECRET_KEY}
      - SUPABASE_S3_REGION=${SUPABASE_S3_REGION:-ap-south-1}
      - SUPABASE_S3_BUCKET=${SUPABASE_S3_BUCKET}
      - SUPABASE_S3_PUBLIC_URL_PREFIX=${SUPABASE_S3_PUBLIC_URL_PREFIX}
    volumes:
      - rag_data:/app/data
    networks:
      - pdf-rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/documents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  rag_data:
    driver: local

networks:
  pdf-rag-network:
    driver: bridge
